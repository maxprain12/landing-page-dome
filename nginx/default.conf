server {
    # Puerto 3000: mismo criterio que el despliegue anterior (serve/Coolify)
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # Normalizar rutas de páginas Astro (directory build)
    location = /privacy {
        return 301 /privacy/;
    }
    location = /terms {
        return 301 /terms/;
    }

    # Sitio estático multipágina: NO usar fallback a /index.html (eso es modo SPA)
    location / {
        try_files $uri $uri/ =404;
    }

    location = /404.html {
        internal;
    }
}
